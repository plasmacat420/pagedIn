<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connecting GitHub…</title>
  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-size: 14px;
    }
    .box {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Connecting your GitHub account…</p>
  </div>
  <script>
    // Extract code from URL and send to the opener (App.jsx is listening)
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (code && window.opener) {
      window.opener.postMessage({ type: 'github_oauth', code }, window.location.origin);
      window.close();
    } else if (error) {
      document.querySelector('p').textContent = 'GitHub authorization was cancelled.';
      setTimeout(() => window.close(), 1500);
    } else {
      document.querySelector('p').textContent = 'No authorization code found. You can close this tab.';
    }
  </script>
</body>
</html>
